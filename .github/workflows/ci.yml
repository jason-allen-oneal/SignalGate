name: ci

on:
  push:
  pull_request:

jobs:
  unit-integration-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3.1.5

      - name: Install deps
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Pytest (non-e2e)
        run: uv run pytest -m "not e2e" -ra

  docker-blackbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Ensure docker compose is available
        run: |
          docker version
          docker compose version || (sudo apt-get update && sudo apt-get install -y docker-compose-plugin)
          docker compose version

      - name: Docker compose black-box test
        run: bash ./scripts/docker_test.sh
