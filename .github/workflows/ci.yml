name: ci

on:
  push:
  pull_request:

permissions: read-all

jobs:
  unit-integration-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v3.1.5

      - name: Install deps
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Pytest (non-e2e)
        run: uv run pytest -m "not e2e" -ra

  docker-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2

      - name: Build runtime image
        run: docker build -t signalgate:ci .

  docker-blackbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2

      - name: Ensure docker compose is available
        run: |
          docker version
          docker compose version

      - name: Docker compose black-box test
        run: bash ./scripts/docker_test.sh
