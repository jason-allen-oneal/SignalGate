name: ci

on:
  push:
  pull_request:

permissions: read-all

jobs:
  unit-integration-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v3.1.5

      - name: Install deps
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Pytest (non-e2e)
        run: uv run pytest -m "not e2e" -ra

  docker-blackbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - name: Ensure docker compose is available
        run: |
          docker version
          docker compose version

      - name: Docker compose black-box test
        run: bash ./scripts/docker_test.sh
